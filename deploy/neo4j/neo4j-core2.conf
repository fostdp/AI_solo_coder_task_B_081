# Neo4j 因果集群核心节点2配置

dbms.mode=CORE
dbms.default_database=graph.db
dbms.default_listen_address=0.0.0.0

dbms.connector.bolt.listen_address=:7687
dbms.connector.http.listen_address=:7474

causal_clustering.minimum_core_cluster_size_at_formation=3
causal_clustering.minimum_core_cluster_size_at_runtime=2
causal_clustering.initial_discovery_members=neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000

dbms.memory.heap.initial_size=512m
dbms.memory.heap.max_size=1024m
dbms.memory.pagecache.size=512m

dbms.tx_log.rotation.size=50M

dbms.security.auth_enabled=true

dbms.logs.query.enabled=true
dbms.logs.query.threshold=200ms
