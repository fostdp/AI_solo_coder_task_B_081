version: '3.8'

x-common-backend: &common-backend
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  networks:
    - tcm-net
  restart: unless-stopped

services:
  mongodb-primary:
    image: mongo:7.0
    container_name: tcm-mongodb-primary
    command: mongod --replSet tcm-replSet --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo-primary-data:/data/db
      - ./deploy/mongodb/mongod.conf:/etc/mongod.conf:ro
      - ./deploy/mongodb/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_REPLICA_SET_NAME: tcm-replSet
    networks:
      - tcm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb-secondary1:
    image: mongo:7.0
    container_name: tcm-mongodb-secondary1
    command: mongod --replSet tcm-replSet --bind_ip_all
    volumes:
      - mongo-secondary1-data:/data/db
    depends_on:
      - mongodb-primary
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    networks:
      - tcm-net
    restart: unless-stopped

  mongodb-secondary2:
    image: mongo:7.0
    container_name: tcm-mongodb-secondary2
    command: mongod --replSet tcm-replSet --bind_ip_all
    volumes:
      - mongo-secondary2-data:/data/db
    depends_on:
      - mongodb-primary
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    networks:
      - tcm-net
    restart: unless-stopped

  mongodb-init:
    image: mongo:7.0
    container_name: tcm-mongodb-init
    depends_on:
      mongodb-primary:
        condition: service_healthy
    volumes:
      - ./deploy/mongodb/init-replica.sh:/init-replica.sh:ro
    entrypoint: ["/bin/bash", "/init-replica.sh"]
    networks:
      - tcm-net
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    restart: "no"

  neo4j-core1:
    image: neo4j:5.16-community
    container_name: tcm-neo4j-core1
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-core1-data:/data
      - neo4j-core1-logs:/logs
      - ./deploy/neo4j/neo4j-core1.conf:/etc/neo4j/neo4j.conf:ro
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_dbms_mode=CORE
      - NEO4J_dbms_default__database=graph.db
      - NEO4J_causal__clustering_minimum__core__cluster__size__at__formation=3
      - NEO4J_causal__clustering_initial__discovery__members=neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000
    networks:
      - tcm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  neo4j-core2:
    image: neo4j:5.16-community
    container_name: tcm-neo4j-core2
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j-core2-data:/data
      - neo4j-core2-logs:/logs
      - ./deploy/neo4j/neo4j-core2.conf:/etc/neo4j/neo4j.conf:ro
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_dbms_mode=CORE
      - NEO4J_dbms_default__database=graph.db
      - NEO4J_causal__clustering_minimum__core__cluster__size__at__formation=3
      - NEO4J_causal__clustering_initial__discovery__members=neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000
    depends_on:
      - neo4j-core1
    networks:
      - tcm-net
    restart: unless-stopped

  neo4j-core3:
    image: neo4j:5.16-community
    container_name: tcm-neo4j-core3
    ports:
      - "7476:7474"
      - "7689:7687"
    volumes:
      - neo4j-core3-data:/data
      - neo4j-core3-logs:/logs
      - ./deploy/neo4j/neo4j-core3.conf:/etc/neo4j/neo4j.conf:ro
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_dbms_mode=CORE
      - NEO4J_dbms_default__database=graph.db
      - NEO4J_causal__clustering_minimum__core__cluster__size__at__formation=3
      - NEO4J_causal__clustering_initial__discovery__members=neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000
    depends_on:
      - neo4j-core1
    networks:
      - tcm-net
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: tcm-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tcm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  tcm-api:
    <<: *common-backend
    container_name: tcm-api-gateway
    command: gunicorn -c gunicorn_conf.py gateway:app
    depends_on:
      mongodb-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb-primary:27017/tcm_formulas?authSource=admin&replicaSet=tcm-replSet&readPreference=primaryPreferred
      NEO4J_URI: bolt://neo4j-core1:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      REDIS_URL: redis://redis:6379/0
      GUNICORN_WORKERS: 4
    ports:
      - "8000:8000"

  data-simulator:
    <<: *common-backend
    container_name: tcm-data-simulator
    command: python -m data.simulator --formulas ${SIM_NUM_FORMULAS:-5000} --targets ${SIM_NUM_TARGETS:-100} --seed ${SIM_SEED:-42}
    depends_on:
      mongodb-primary:
        condition: service_healthy
      neo4j-core1:
        condition: service_healthy
    environment:
      MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb-primary:27017/tcm_formulas?authSource=admin&replicaSet=tcm-replSet&readPreference=primaryPreferred
      NEO4J_URI: bolt://neo4j-core1:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      REDIS_URL: redis://redis:6379/0
      SIM_DYNASTY_WEIGHTS: ${SIM_DYNASTY_WEIGHTS:-}
      SIM_IMPORT_NEO4J: "true"
      SIM_CLEAR_BEFORE: ${SIM_CLEAR_BEFORE:-true}
    restart: "no"
    profiles:
      - simulator

  frontend-nginx:
    image: nginx:1.25-alpine
    container_name: tcm-frontend-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - tcm-api
    networks:
      - tcm-net
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1.0
    container_name: tcm-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb-primary:27017/?authSource=admin&replicaSet=tcm-replSet
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASSWORD:-password}
    depends_on:
      - mongodb-primary
    networks:
      - tcm-net
    restart: unless-stopped
    profiles:
      - admin

networks:
  tcm-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mongo-primary-data:
  mongo-secondary1-data:
  mongo-secondary2-data:
  neo4j-core1-data:
  neo4j-core1-logs:
  neo4j-core2-data:
  neo4j-core2-logs:
  neo4j-core3-data:
  neo4j-core3-logs:
  redis-data:
